<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Argus Portfolio</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --green: #00d68f;
    --red: #ff6b6b;
    --text: #eaeaea;
    --muted: #8892b0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 12px;
    min-height: 100vh;
  }
  .header {
    text-align: center;
    padding: 8px 0 16px;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .date { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 20px; font-weight: 700; margin-top: 4px; }
  .stat-card .value.positive { color: var(--green); }
  .stat-card .value.negative { color: var(--red); }

  .chart-section {
    background: var(--surface);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 16px;
  }
  .chart-section h2 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .chart-container { position: relative; height: 220px; }

  .positions-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .positions-table th {
    text-align: left;
    padding: 6px 8px;
    color: var(--muted);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .positions-table td {
    padding: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .positions-table .ticker { font-weight: 600; }
  .positions-table .pnl-pos { color: var(--green); }
  .positions-table .pnl-neg { color: var(--red); }
  .positions-table .align-r { text-align: right; }

  .footer {
    text-align: center;
    padding: 12px 0;
    font-size: 11px;
    color: var(--muted);
  }

  .error {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .error h2 { color: var(--accent); margin-bottom: 8px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// Decode portfolio data from URL
function getPortfolioData() {
  const params = new URLSearchParams(window.location.search);
  const encoded = params.get('d');
  if (!encoded) return null;
  try {
    const json = atob(encoded.replace(/-/g, '+').replace(/_/g, '/'));
    return JSON.parse(json);
  } catch (e) {
    console.error('Failed to decode data:', e);
    return null;
  }
}

function fmt(n, decimals = 0) {
  return new Intl.NumberFormat('en-US', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals,
  }).format(n);
}

function render(data) {
  const app = document.getElementById('app');

  if (!data || !data.positions || data.positions.length === 0) {
    app.innerHTML = `
      <div class="error">
        <h2>No Data</h2>
        <p>Portfolio data not found. Please use the bot to generate a dashboard link.</p>
      </div>`;
    return;
  }

  const totalValue = data.positions.reduce((s, p) => s + p.qty * p.price, 0);
  const totalCost = data.positions.reduce((s, p) => s + p.qty * p.avg, 0);
  const totalPnl = totalValue - totalCost;
  const totalPnlPct = totalCost > 0 ? (totalPnl / totalCost * 100) : 0;

  // Sort by value descending
  const sorted = [...data.positions].sort((a, b) => (b.qty * b.price) - (a.qty * a.price));

  app.innerHTML = `
    <div class="header">
      <h1>Argus Portfolio Dashboard</h1>
      <div class="date">${data.user || ''} | ${data.date || new Date().toLocaleDateString()}</div>
    </div>

    <div class="summary">
      <div class="stat-card">
        <div class="label">Total Value</div>
        <div class="value">$${fmt(totalValue)}</div>
      </div>
      <div class="stat-card">
        <div class="label">Total P&L</div>
        <div class="value ${totalPnl >= 0 ? 'positive' : 'negative'}">
          ${totalPnl >= 0 ? '+' : ''}$${fmt(totalPnl)} (${totalPnlPct >= 0 ? '+' : ''}${totalPnlPct.toFixed(1)}%)
        </div>
      </div>
    </div>

    <div class="chart-section">
      <h2>Asset Allocation</h2>
      <div class="chart-container"><canvas id="pieChart"></canvas></div>
    </div>

    <div class="chart-section">
      <h2>P&L by Position</h2>
      <div class="chart-container"><canvas id="pnlChart"></canvas></div>
    </div>

    <div class="chart-section">
      <h2>Holdings</h2>
      <table class="positions-table">
        <thead>
          <tr><th>Ticker</th><th class="align-r">Qty</th><th class="align-r">Price</th><th class="align-r">Value</th><th class="align-r">P&L</th></tr>
        </thead>
        <tbody>
          ${sorted.map(p => {
            const val = p.qty * p.price;
            const pnl = (p.price - p.avg) * p.qty;
            const pnlPct = p.avg > 0 ? ((p.price - p.avg) / p.avg * 100) : 0;
            return `<tr>
              <td class="ticker">${p.ticker}</td>
              <td class="align-r">${fmt(p.qty, 1)}</td>
              <td class="align-r">$${fmt(p.price, 2)}</td>
              <td class="align-r">$${fmt(val)}</td>
              <td class="align-r ${pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${pnl >= 0 ? '+' : ''}${pnlPct.toFixed(1)}%</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <div class="footer">Powered by Argus | Data as of ${data.date || 'now'}</div>
  `;

  // Pie chart — asset allocation
  const pieColors = ['#e94560','#0f3460','#00d68f','#533483','#f0a500','#3282b8','#ff6b6b','#48c9b0','#a569bd','#5dade2'];
  new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: sorted.map(p => p.ticker),
      datasets: [{
        data: sorted.map(p => p.qty * p.price),
        backgroundColor: pieColors.slice(0, sorted.length),
        borderWidth: 0,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'right',
          labels: { color: '#eaeaea', font: { size: 11 }, boxWidth: 12, padding: 8 }
        },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const val = ctx.raw;
              const pct = (val / totalValue * 100).toFixed(1);
              return ` $${fmt(val)} (${pct}%)`;
            }
          }
        }
      }
    }
  });

  // P&L bar chart
  const pnls = sorted.map(p => (p.price - p.avg) * p.qty);
  new Chart(document.getElementById('pnlChart'), {
    type: 'bar',
    data: {
      labels: sorted.map(p => p.ticker),
      datasets: [{
        data: pnls,
        backgroundColor: pnls.map(v => v >= 0 ? 'rgba(0,214,143,0.7)' : 'rgba(255,107,107,0.7)'),
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => ` ${ctx.raw >= 0 ? '+' : ''}$${fmt(ctx.raw)}`
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#8892b0', callback: (v) => '$' + fmt(v) }
        },
        y: {
          grid: { display: false },
          ticks: { color: '#eaeaea', font: { weight: 600 } }
        }
      }
    }
  });
}

// Init
const data = getPortfolioData();
render(data);

// Telegram WebApp integration
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}
</script>
</body>
</html>
