<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Argus Portfolio</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
/* ============================================================
   CSS Variables & Reset
   ============================================================ */
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --card: #0f3460;
  --accent: #e94560;
  --green: #00d68f;
  --red: #ff6b6b;
  --text: #eaeaea;
  --muted: #8892b0;
  --tab-height: 60px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ============================================================
   Tab Content Area
   ============================================================ */
.tab-content {
  padding: 12px 12px calc(var(--tab-height) + 16px);
  display: none;
  min-height: 100vh;
}
.tab-content.active { display: block; }

/* ============================================================
   Bottom Tab Bar
   ============================================================ */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--tab-height);
  background: var(--surface);
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.06);
  z-index: 1000;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 11px;
  cursor: pointer;
  border-top: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn .tab-icon { font-size: 20px; line-height: 1; }
.tab-btn.active {
  color: var(--accent);
  border-top-color: var(--accent);
}

/* ============================================================
   Shared Components
   ============================================================ */
.header {
  text-align: center;
  padding: 8px 0 16px;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header .date { font-size: 12px; color: var(--muted); margin-top: 2px; }

.summary {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--surface);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
}
.stat-card .label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stat-card .value {
  font-size: 20px;
  font-weight: 700;
  margin-top: 4px;
}
.stat-card .value.positive { color: var(--green); }
.stat-card .value.negative { color: var(--red); }

.section {
  background: var(--surface);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
}
.section h2 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
}
.chart-container {
  position: relative;
  height: 220px;
}

/* ============================================================
   Holdings Table
   ============================================================ */
.positions-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.positions-table th {
  text-align: left;
  padding: 6px 8px;
  color: var(--muted);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.positions-table td {
  padding: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.positions-table tr.clickable { cursor: pointer; }
.positions-table tr.clickable:active { background: rgba(255,255,255,0.03); }
.positions-table .ticker { font-weight: 600; }
.positions-table .pnl-pos { color: var(--green); }
.positions-table .pnl-neg { color: var(--red); }
.positions-table .align-r { text-align: right; }
.positions-table .twd-note {
  font-size: 10px;
  color: var(--muted);
  display: block;
}

/* ============================================================
   Quick Analysis Panel (inline expand in portfolio)
   ============================================================ */
.quick-analysis {
  display: none;
  background: var(--card);
  border-radius: 8px;
  padding: 12px;
  margin: 4px 0 8px;
}
.quick-analysis.open { display: block; animation: fadeIn 0.2s ease; }
.persona-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.persona-pill {
  background: var(--surface);
  color: var(--muted);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 4px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.persona-pill:active,
.persona-pill.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.qa-result {
  font-size: 13px;
  line-height: 1.5;
  color: var(--text);
  min-height: 40px;
}
.qa-result .qa-loading {
  color: var(--muted);
  text-align: center;
  padding: 12px;
}

/* ============================================================
   Analysis Tab
   ============================================================ */
.search-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.search-bar input {
  flex: 1;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 15px;
  outline: none;
}
.search-bar input::placeholder { color: var(--muted); }
.search-bar input:focus { border-color: var(--accent); }
.search-bar button {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 0 18px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.search-bar button:active { opacity: 0.8; }

.persona-selector {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}
.persona-selector .persona-pill.selected {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.analysis-results { min-height: 100px; }
.analysis-card {
  background: var(--surface);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}
.analysis-card .radar-container {
  position: relative;
  height: 250px;
  margin-bottom: 12px;
}
.action-badge {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.action-badge.buy { background: rgba(0,214,143,0.2); color: var(--green); }
.action-badge.hold { background: rgba(233,69,96,0.15); color: #f0a500; }
.action-badge.avoid { background: rgba(255,107,107,0.2); color: var(--red); }

.confidence-bar {
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  margin-top: 10px;
  overflow: hidden;
}
.confidence-bar .fill {
  height: 100%;
  border-radius: 3px;
  background: var(--accent);
  transition: width 0.4s ease;
}
.confidence-label {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

/* ============================================================
   Calendar Tab
   ============================================================ */
.calendar-item {
  background: var(--surface);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.calendar-item .cal-date {
  text-align: center;
  min-width: 48px;
}
.calendar-item .cal-date .month {
  font-size: 10px;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 600;
}
.calendar-item .cal-date .day {
  font-size: 22px;
  font-weight: 700;
}
.calendar-item .cal-info { flex: 1; }
.calendar-item .cal-info .cal-ticker {
  font-weight: 600;
  font-size: 15px;
}
.calendar-item .cal-info .cal-meta {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}
.calendar-item .cal-days {
  text-align: right;
  font-size: 12px;
  color: var(--muted);
}
.calendar-item .cal-days .num {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  display: block;
}
.calendar-item.holding { border-left: 3px solid var(--accent); }

/* ============================================================
   Alerts Tab
   ============================================================ */
.alert-item {
  background: var(--surface);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.alert-item .alert-info .alert-ticker {
  font-weight: 600;
  font-size: 15px;
}
.alert-item .alert-info .alert-condition {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}
.alert-item .alert-status {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  font-weight: 600;
}
.alert-item .alert-status.active-status {
  background: rgba(0,214,143,0.15);
  color: var(--green);
}
.alert-item .alert-status.triggered-status {
  background: rgba(233,69,96,0.15);
  color: var(--accent);
}
.alert-item .alert-delete {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  margin-left: 8px;
}
.alert-item .alert-delete:active { color: var(--red); }

.add-alert-btn {
  display: block;
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 16px;
}
.add-alert-btn:active { opacity: 0.8; }

.alert-form {
  display: none;
  background: var(--surface);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}
.alert-form.open { display: block; animation: fadeIn 0.2s ease; }
.alert-form .form-group {
  margin-bottom: 12px;
}
.alert-form label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.alert-form input,
.alert-form select {
  width: 100%;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.alert-form input:focus,
.alert-form select:focus { border-color: var(--accent); }
.alert-form select { appearance: none; }
.alert-form .form-actions {
  display: flex;
  gap: 8px;
}
.alert-form .form-actions button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
.alert-form .btn-save {
  background: var(--green);
  color: #111;
}
.alert-form .btn-cancel {
  background: rgba(255,255,255,0.08);
  color: var(--text);
}

/* ============================================================
   Shared States
   ============================================================ */
.loading-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}
.spinner {
  display: inline-block;
  width: 32px;
  height: 32px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 12px;
}
.error-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}
.error-state h3 { color: var(--accent); margin-bottom: 8px; font-size: 16px; }
.retry-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 12px;
}
.retry-btn:active { opacity: 0.8; }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 14px;
}
.empty-state .empty-icon { font-size: 36px; margin-bottom: 8px; }

.footer {
  text-align: center;
  padding: 12px 0;
  font-size: 11px;
  color: var(--muted);
}

/* ============================================================
   Animations
   ============================================================ */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- ============================================================
     Tab 1: Portfolio
     ============================================================ -->
<div id="tab-portfolio" class="tab-content active">
  <div id="portfolio-content">
    <div class="loading-state"><div class="spinner"></div><div>Loading portfolio...</div></div>
  </div>
</div>

<!-- ============================================================
     Tab 2: Analysis
     ============================================================ -->
<div id="tab-analysis" class="tab-content">
  <div class="header">
    <h1>Multi-Persona Analysis</h1>
    <div class="date">Select a ticker and investment persona</div>
  </div>

  <div class="search-bar">
    <input id="analysis-ticker" type="text" placeholder="Ticker (e.g. TSLA)" autocapitalize="characters" spellcheck="false">
    <button id="analysis-go" type="button">Go</button>
  </div>

  <div class="persona-selector" id="persona-selector">
    <button class="persona-pill selected" data-persona="buffett">Buffett</button>
    <button class="persona-pill" data-persona="marks">Marks</button>
    <button class="persona-pill selected" data-persona="dalio">Dalio</button>
    <button class="persona-pill selected" data-persona="wood">Wood</button>
    <button class="persona-pill" data-persona="lynch">Lynch</button>
    <button class="persona-pill" data-persona="gmo">GMO</button>
    <button class="persona-pill" data-persona="greenblatt">Greenblatt</button>
    <button class="persona-pill" data-persona="growth">Growth</button>
    <button class="persona-pill" data-persona="quant">Quant</button>
  </div>

  <div class="analysis-results" id="analysis-results">
    <div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div>Enter a ticker and tap Go to start analysis</div>
    </div>
  </div>
</div>

<!-- ============================================================
     Tab 3: Calendar
     ============================================================ -->
<div id="tab-calendar" class="tab-content">
  <div class="header">
    <h1>Earnings Calendar</h1>
    <div class="date">Upcoming earnings for your holdings</div>
  </div>
  <div id="calendar-content">
    <div class="loading-state"><div class="spinner"></div><div>Loading calendar...</div></div>
  </div>
</div>

<!-- ============================================================
     Tab 4: Alerts
     ============================================================ -->
<div id="tab-alerts" class="tab-content">
  <div class="header">
    <h1>Price Alerts</h1>
    <div class="date">Get notified when prices hit your targets</div>
  </div>

  <button class="add-alert-btn" id="add-alert-btn">+ Add Alert</button>

  <div class="alert-form" id="alert-form">
    <div class="form-group">
      <label>Ticker</label>
      <input id="alert-ticker" type="text" placeholder="e.g. AAPL" autocapitalize="characters" spellcheck="false">
    </div>
    <div class="form-group">
      <label>Condition</label>
      <select id="alert-condition">
        <option value="above">Price Above</option>
        <option value="below">Price Below</option>
      </select>
    </div>
    <div class="form-group">
      <label>Target Price (USD)</label>
      <input id="alert-price" type="number" inputmode="decimal" placeholder="0.00">
    </div>
    <div class="form-actions">
      <button class="btn-cancel" id="alert-cancel" type="button">Cancel</button>
      <button class="btn-save" id="alert-save" type="button">Save</button>
    </div>
  </div>

  <div id="alerts-content">
    <div class="loading-state"><div class="spinner"></div><div>Loading alerts...</div></div>
  </div>
</div>

<!-- ============================================================
     Bottom Tab Bar
     ============================================================ -->
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="portfolio">
    <span class="tab-icon">📊</span>
    <span>Portfolio</span>
  </button>
  <button class="tab-btn" data-tab="analysis">
    <span class="tab-icon">🔍</span>
    <span>Analysis</span>
  </button>
  <button class="tab-btn" data-tab="calendar">
    <span class="tab-icon">📅</span>
    <span>Calendar</span>
  </button>
  <button class="tab-btn" data-tab="alerts">
    <span class="tab-icon">⚡</span>
    <span>Alerts</span>
  </button>
</nav>

<script>
/* ============================================================
   Constants & State
   ============================================================ */
const API_BASE = 'https://argus-api.irisgo.xyz';

const PERSONAS = ['buffett','marks','dalio','wood','lynch','gmo','greenblatt','growth','quant'];
const PERSONA_LABELS = {
  buffett: 'Buffett', marks: 'Marks', dalio: 'Dalio', wood: 'Wood',
  lynch: 'Lynch', gmo: 'GMO', greenblatt: 'Greenblatt', growth: 'Growth', quant: 'Quant'
};

let state = {
  portfolio: null,
  calendarData: null,
  alertsData: null,
  calendarLoaded: false,
  alertsLoaded: false,
  activeTab: 'portfolio',
  analysisPersona: 'buffett',
  chartInstances: {},
};

/* ============================================================
   Telegram WebApp Init & Auth
   ============================================================ */
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

function getAuthHeaders() {
  if (tg?.initData) return { 'X-Telegram-Init-Data': tg.initData };
  return {};
}

function getAuthParams() {
  const tgUser = tg?.initDataUnsafe?.user;
  if (tgUser?.id) return `tgId=${tgUser.id}`;
  const params = new URLSearchParams(window.location.search);
  const userId = params.get('userId') || params.get('tgId');
  if (userId) return `userId=${userId}`;
  return '';
}

function getUserName() {
  return tg?.initDataUnsafe?.user?.first_name || '';
}

/* ============================================================
   Utility Functions
   ============================================================ */
function fmt(n, decimals = 0) {
  return new Intl.NumberFormat('en-US', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals,
  }).format(n);
}

function fmtCurrency(n, decimals = 0) {
  return '$' + fmt(Math.abs(n), decimals);
}

function destroyChart(key) {
  if (state.chartInstances[key]) {
    state.chartInstances[key].destroy();
    delete state.chartInstances[key];
  }
}

async function apiFetch(path, opts = {}) {
  const authParams = getAuthParams();
  const sep = path.includes('?') ? '&' : '?';
  const url = `${API_BASE}${path}${authParams ? sep + authParams : ''}`;
  const headers = { ...getAuthHeaders(), ...(opts.headers || {}) };
  const resp = await fetch(url, { ...opts, headers });
  if (!resp.ok) throw new Error(`API ${resp.status}: ${resp.statusText}`);
  return resp.json();
}

function renderLoading(msg = 'Loading...') {
  return `<div class="loading-state"><div class="spinner"></div><div>${msg}</div></div>`;
}

function renderError(msg, retryFn) {
  const id = 'retry_' + Math.random().toString(36).slice(2, 8);
  setTimeout(() => {
    const btn = document.getElementById(id);
    if (btn) btn.addEventListener('click', retryFn);
  }, 0);
  return `<div class="error-state"><h3>Error</h3><p>${msg}</p><button class="retry-btn" id="${id}">Retry</button></div>`;
}

function renderEmpty(icon, msg) {
  return `<div class="empty-state"><div class="empty-icon">${icon}</div><div>${msg}</div></div>`;
}

/* ============================================================
   Tab Switching
   ============================================================ */
const tabBtns = document.querySelectorAll('.tab-btn');
const tabPanels = document.querySelectorAll('.tab-content');

tabBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    if (tab === state.activeTab) return;

    tabBtns.forEach(b => b.classList.remove('active'));
    tabPanels.forEach(p => p.classList.remove('active'));

    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    state.activeTab = tab;

    // Lazy-load data on first tab visit
    if (tab === 'calendar' && !state.calendarLoaded) loadCalendar();
    if (tab === 'alerts' && !state.alertsLoaded) loadAlerts();
  });
});

/* ============================================================
   Tab 1: Portfolio
   ============================================================ */
const CHART_COLORS = [
  '#e94560','#0f3460','#00d68f','#533483','#f0a500',
  '#3282b8','#ff6b6b','#48c9b0','#a569bd','#5dade2',
  '#e67e22','#1abc9c','#9b59b6','#2ecc71','#e74c3c',
];

const QA_PERSONAS = ['buffett','wood','dalio'];

function renderPortfolio(data) {
  const el = document.getElementById('portfolio-content');

  if (!data?.positions?.length) {
    el.innerHTML = renderEmpty('📊', 'No positions found. Add holdings via the bot.');
    return;
  }

  state.portfolio = data;

  // Compute totals (positions with currency=TWD: convert using usdValue if present)
  const positions = data.positions.map(p => {
    const value = p.usdValue ?? p.qty * p.price;
    const cost = p.usdCost ?? p.qty * (p.avg || p.price);
    return { ...p, _value: value, _cost: cost, _pnl: value - cost };
  });

  const totalValue = positions.reduce((s, p) => s + p._value, 0);
  const totalCost = positions.reduce((s, p) => s + p._cost, 0);
  const totalPnl = totalValue - totalCost;
  const totalPnlPct = totalCost > 0 ? (totalPnl / totalCost * 100) : 0;

  const sorted = [...positions].sort((a, b) => b._value - a._value);

  el.innerHTML = `
    <div class="header">
      <h1>Argus Portfolio</h1>
      <div class="date">${getUserName()}${data.generatedAt ? ' | ' + data.generatedAt.split('T')[0] : ''}</div>
    </div>

    <div class="summary">
      <div class="stat-card">
        <div class="label">Total Value</div>
        <div class="value">$${fmt(totalValue)}</div>
      </div>
      <div class="stat-card">
        <div class="label">Total P&L</div>
        <div class="value ${totalPnl >= 0 ? 'positive' : 'negative'}">
          ${totalPnl >= 0 ? '+' : '-'}$${fmt(Math.abs(totalPnl))} (${totalPnlPct >= 0 ? '+' : ''}${totalPnlPct.toFixed(1)}%)
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Asset Allocation</h2>
      <div class="chart-container"><canvas id="allocationChart"></canvas></div>
    </div>

    <div class="section">
      <h2>P&L by Position</h2>
      <div class="chart-container" style="height:${Math.max(160, sorted.length * 32)}px"><canvas id="pnlBarChart"></canvas></div>
    </div>

    <div class="section">
      <h2>Holdings</h2>
      <table class="positions-table">
        <thead>
          <tr>
            <th>Ticker</th>
            <th class="align-r">Qty</th>
            <th class="align-r">Price</th>
            <th class="align-r">Value</th>
            <th class="align-r">P&L</th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map((p, i) => {
            const pnlPct = p._cost > 0 ? (p._pnl / p._cost * 100) : 0;
            const isTWD = p.currency === 'TWD';
            return `
              <tr class="clickable" data-idx="${i}">
                <td class="ticker">${p.ticker}</td>
                <td class="align-r">${fmt(p.qty, p.qty < 10 ? 2 : 1)}</td>
                <td class="align-r">
                  ${isTWD ? 'NT$' + fmt(p.price, 2) : '$' + fmt(p.price, 2)}
                  ${isTWD ? '<span class="twd-note">~$' + fmt(p._value / p.qty, 2) + ' USD</span>' : ''}
                </td>
                <td class="align-r">$${fmt(p._value)}</td>
                <td class="align-r ${p._pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${p._pnl >= 0 ? '+' : ''}${pnlPct.toFixed(1)}%</td>
              </tr>
              <tr><td colspan="5" style="padding:0"><div class="quick-analysis" id="qa-${i}">
                <div class="persona-pills">
                  ${QA_PERSONAS.map(pp => `<button class="persona-pill" data-ticker="${p.ticker}" data-persona="${pp}">${PERSONA_LABELS[pp]}</button>`).join('')}
                </div>
                <div class="qa-result" id="qa-result-${i}">Tap a persona to get quick analysis</div>
              </div></td></tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <div class="footer">Powered by Argus</div>
  `;

  // Build allocation doughnut
  destroyChart('allocation');
  state.chartInstances.allocation = new Chart(document.getElementById('allocationChart'), {
    type: 'doughnut',
    data: {
      labels: sorted.map(p => p.ticker),
      datasets: [{
        data: sorted.map(p => p._value),
        backgroundColor: CHART_COLORS.slice(0, sorted.length),
        borderWidth: 0,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '55%',
      plugins: {
        legend: {
          position: 'right',
          labels: { color: '#eaeaea', font: { size: 11 }, boxWidth: 12, padding: 8 }
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              const pct = (ctx.raw / totalValue * 100).toFixed(1);
              return ` $${fmt(ctx.raw)} (${pct}%)`;
            }
          }
        }
      }
    }
  });

  // Build P&L horizontal bar
  const pnls = sorted.map(p => p._pnl);
  destroyChart('pnlBar');
  state.chartInstances.pnlBar = new Chart(document.getElementById('pnlBarChart'), {
    type: 'bar',
    data: {
      labels: sorted.map(p => p.ticker),
      datasets: [{
        data: pnls,
        backgroundColor: pnls.map(v => v >= 0 ? 'rgba(0,214,143,0.7)' : 'rgba(255,107,107,0.7)'),
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.raw >= 0 ? '+' : '-'}$${fmt(Math.abs(ctx.raw))}`
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#8892b0', callback: v => (v >= 0 ? '$' : '-$') + fmt(Math.abs(v)) }
        },
        y: {
          grid: { display: false },
          ticks: { color: '#eaeaea', font: { weight: '600' } }
        }
      }
    }
  });

  // Clickable rows — toggle quick analysis panel
  el.querySelectorAll('tr.clickable').forEach(row => {
    row.addEventListener('click', () => {
      const idx = row.dataset.idx;
      const panel = document.getElementById('qa-' + idx);
      panel.classList.toggle('open');
    });
  });

  // Quick analysis persona pills
  el.querySelectorAll('.quick-analysis .persona-pill').forEach(pill => {
    pill.addEventListener('click', async (e) => {
      e.stopPropagation();
      const ticker = pill.dataset.ticker;
      const persona = pill.dataset.persona;
      const row = pill.closest('.quick-analysis');
      const resultEl = row.querySelector('.qa-result');

      // Highlight active pill
      row.querySelectorAll('.persona-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');

      resultEl.innerHTML = '<div class="qa-loading"><div class="spinner"></div><div>Analyzing...</div></div>';

      try {
        const raw = await apiFetch(`/api/analyze?ticker=${encodeURIComponent(ticker)}&persona=${persona}`);
        const data = raw.analysis || raw;
        const action = (data.action || 'HOLD').toUpperCase();
        const actionClass = action.includes('BUY') || action.includes('SCALE') ? 'buy'
          : action.includes('AVOID') || action.includes('SELL') ? 'avoid' : 'hold';
        resultEl.innerHTML = `
          <div style="margin-bottom:8px"><span class="action-badge ${actionClass}">${action}</span></div>
          <div style="font-size:13px;line-height:1.5">${data.summary || 'No analysis available.'}</div>
        `;
      } catch (err) {
        resultEl.innerHTML = `<div style="color:var(--red);font-size:13px">Failed to load analysis</div>`;
      }
    });
  });
}

async function loadPortfolio() {
  const el = document.getElementById('portfolio-content');
  el.innerHTML = renderLoading('Loading portfolio...');

  // Strategy 1: Try URL-encoded data (direct link from bot)
  const params = new URLSearchParams(window.location.search);
  const encoded = params.get('d');
  if (encoded) {
    try {
      const json = atob(encoded.replace(/-/g, '+').replace(/_/g, '/'));
      const data = JSON.parse(json);
      renderPortfolio({ positions: data.positions, generatedAt: data.date, user: data.user });
      return;
    } catch (e) { /* fall through to API */ }
  }

  // Strategy 2: API fetch
  try {
    const data = await apiFetch('/api/portfolio');
    renderPortfolio(data);
  } catch (err) {
    el.innerHTML = renderError(
      'Could not load portfolio. Open from the Telegram bot (@SSXargusbot).',
      loadPortfolio
    );
  }
}

/* ============================================================
   Tab 2: Analysis
   ============================================================ */
const personaSelector = document.getElementById('persona-selector');
const analysisInput = document.getElementById('analysis-ticker');
const analysisGoBtn = document.getElementById('analysis-go');
const analysisResults = document.getElementById('analysis-results');

// Multi-select persona pills (toggle, max 4)
const PERSONA_COLORS = {
  buffett: { bg: 'rgba(233,69,96,0.15)', border: '#e94560', point: '#e94560' },
  marks:   { bg: 'rgba(243,156,18,0.15)', border: '#f39c12', point: '#f39c12' },
  dalio:   { bg: 'rgba(52,152,219,0.15)', border: '#3498db', point: '#3498db' },
  wood:    { bg: 'rgba(155,89,182,0.15)', border: '#9b59b6', point: '#9b59b6' },
  lynch:   { bg: 'rgba(0,214,143,0.15)',  border: '#00d68f', point: '#00d68f' },
  gmo:     { bg: 'rgba(241,196,15,0.15)', border: '#f1c40f', point: '#f1c40f' },
  greenblatt:{ bg:'rgba(230,126,34,0.15)',border: '#e67e22', point: '#e67e22' },
  growth:  { bg: 'rgba(26,188,156,0.15)', border: '#1abc9c', point: '#1abc9c' },
  quant:   { bg: 'rgba(149,165,166,0.15)',border: '#95a5a6', point: '#95a5a6' },
};

state.selectedPersonas = new Set(['buffett', 'wood', 'dalio']);

personaSelector.querySelectorAll('.persona-pill').forEach(pill => {
  // Pre-select defaults
  if (state.selectedPersonas.has(pill.dataset.persona)) pill.classList.add('selected');

  pill.addEventListener('click', () => {
    const p = pill.dataset.persona;
    if (state.selectedPersonas.has(p)) {
      if (state.selectedPersonas.size > 1) { // keep at least 1
        state.selectedPersonas.delete(p);
        pill.classList.remove('selected');
      }
    } else {
      if (state.selectedPersonas.size >= 4) return; // max 4
      state.selectedPersonas.add(p);
      pill.classList.add('selected');
    }
  });
});

analysisGoBtn.addEventListener('click', runAnalysis);
analysisInput.addEventListener('keydown', e => { if (e.key === 'Enter') runAnalysis(); });

async function runAnalysis() {
  const ticker = analysisInput.value.trim().toUpperCase();
  if (!ticker) return;

  const personas = [...state.selectedPersonas];
  const personaNames = personas.map(p => PERSONA_LABELS[p]).join(' vs ');
  analysisResults.innerHTML = renderLoading(`Analyzing ${ticker}\n${personaNames}...`);

  try {
    const raw = await apiFetch(`/api/analyze-multi?ticker=${encodeURIComponent(ticker)}&personas=${personas.join(',')}`);
    const results = raw.results || [];

    if (results.length === 0) {
      analysisResults.innerHTML = renderError('No analysis results', runAnalysis);
      return;
    }

    const norm = v => typeof v === 'number' ? (v <= 10 ? v * 10 : v) : 50;
    const radarLabels = ['Value', 'Growth', 'Momentum', 'Risk', 'Quality'];

    // Build action badges + summaries
    const cards = results.map(r => {
      const d = r.analysis || {};
      const action = (d.action || 'HOLD').toUpperCase();
      const cls = action.includes('BUY') || action.includes('SCALE') ? 'buy'
        : action.includes('AVOID') || action.includes('SELL') ? 'avoid' : 'hold';
      const conf = typeof d.confidence === 'number'
        ? (d.confidence <= 1 ? Math.round(d.confidence * 100) : d.confidence) : 0;
      const color = PERSONA_COLORS[r.persona]?.border || '#888';
      return `
        <div style="border-left:3px solid ${color};padding:8px 12px;margin-bottom:10px;background:rgba(255,255,255,0.03);border-radius:0 8px 8px 0">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <span style="font-weight:600;color:${color}">${PERSONA_LABELS[r.persona]}</span>
            <span class="action-badge ${cls}" style="font-size:11px;padding:2px 8px">${action}</span>
          </div>
          <div style="font-size:12px;line-height:1.5;color:var(--muted)">${d.summary || ''}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">Confidence: ${conf}%</div>
        </div>`;
    }).join('');

    analysisResults.innerHTML = `
      <div class="analysis-card">
        <div style="margin-bottom:12px">
          <span style="font-size:20px;font-weight:700">${ticker}</span>
          <span style="font-size:13px;color:var(--muted);margin-left:8px">${results.length} perspectives</span>
        </div>
        <div class="radar-container" style="height:260px"><canvas id="radarChart"></canvas></div>
        <div style="margin-top:12px">${cards}</div>
      </div>`;

    // Build overlay radar chart
    const datasets = results.map(r => {
      const d = r.analysis?.dimensions || {};
      const c = PERSONA_COLORS[r.persona] || PERSONA_COLORS.quant;
      return {
        label: PERSONA_LABELS[r.persona],
        data: [norm(d.value), norm(d.growth), norm(d.momentum), norm(d.risk), norm(d.quality)],
        backgroundColor: c.bg,
        borderColor: c.border,
        pointBackgroundColor: c.point,
        pointBorderColor: '#fff',
        pointRadius: 3,
        borderWidth: 2,
      };
    });

    destroyChart('radar');
    state.chartInstances.radar = new Chart(document.getElementById('radarChart'), {
      type: 'radar',
      data: { labels: radarLabels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: { color: '#eaeaea', font: { size: 11 }, boxWidth: 12, padding: 8 },
          },
        },
        scales: {
          r: {
            beginAtZero: true,
            max: 100,
            ticks: { stepSize: 25, color: '#8892b0', backdropColor: 'transparent', font: { size: 9 } },
            grid: { color: 'rgba(255,255,255,0.08)' },
            angleLines: { color: 'rgba(255,255,255,0.08)' },
            pointLabels: { color: '#eaeaea', font: { size: 11, weight: '600' } },
          },
        },
      },
    });
  } catch (err) {
    analysisResults.innerHTML = renderError(`Analysis failed for ${ticker}`, runAnalysis);
  }
}

/* ============================================================
   Tab 3: Calendar
   ============================================================ */
function renderCalendar(data) {
  const el = document.getElementById('calendar-content');
  const events = data.events || data.earnings || data || [];

  if (!events.length) {
    el.innerHTML = renderEmpty('📅', 'No upcoming earnings found for your holdings.');
    return;
  }

  const holdingTickers = (state.portfolio?.positions || []).map(p => p.ticker.toUpperCase());

  el.innerHTML = events.map(ev => {
    const date = new Date(ev.date);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const now = new Date();
    const diffMs = date - now;
    const daysUntil = Math.max(0, Math.ceil(diffMs / (1000 * 60 * 60 * 24)));
    const ticker = (ev.ticker || '').toUpperCase();
    const isHolding = holdingTickers.includes(ticker);

    return `
      <div class="calendar-item ${isHolding ? 'holding' : ''}">
        <div class="cal-date">
          <div class="month">${months[date.getMonth()]}</div>
          <div class="day">${date.getDate()}</div>
        </div>
        <div class="cal-info">
          <div class="cal-ticker">${ticker}${isHolding ? ' <span style="color:var(--accent);font-size:11px">HELD</span>' : ''}</div>
          <div class="cal-meta">${ev.name || 'Earnings Report'}${ev.estimatedEps != null ? ' | Est. EPS: $' + ev.estimatedEps : ''}</div>
        </div>
        <div class="cal-days">
          <span class="num">${daysUntil}</span>
          day${daysUntil !== 1 ? 's' : ''}
        </div>
      </div>`;
  }).join('');
}

async function loadCalendar() {
  const el = document.getElementById('calendar-content');
  el.innerHTML = renderLoading('Loading earnings calendar...');
  state.calendarLoaded = true;

  try {
    const data = await apiFetch('/api/calendar');
    state.calendarData = data;
    renderCalendar(data);
  } catch (err) {
    state.calendarLoaded = false;
    el.innerHTML = renderError('Could not load calendar data.', loadCalendar);
  }
}

/* ============================================================
   Tab 4: Alerts
   ============================================================ */
const addAlertBtn = document.getElementById('add-alert-btn');
const alertForm = document.getElementById('alert-form');
const alertCancel = document.getElementById('alert-cancel');
const alertSave = document.getElementById('alert-save');

addAlertBtn.addEventListener('click', () => {
  alertForm.classList.toggle('open');
  if (alertForm.classList.contains('open')) {
    document.getElementById('alert-ticker').value = '';
    document.getElementById('alert-price').value = '';
    document.getElementById('alert-condition').value = 'above';
    document.getElementById('alert-ticker').focus();
  }
});

alertCancel.addEventListener('click', () => alertForm.classList.remove('open'));

alertSave.addEventListener('click', async () => {
  const ticker = document.getElementById('alert-ticker').value.trim().toUpperCase();
  const condition = document.getElementById('alert-condition').value;
  const price = parseFloat(document.getElementById('alert-price').value);

  if (!ticker || isNaN(price) || price <= 0) return;

  alertSave.textContent = 'Saving...';
  alertSave.disabled = true;

  try {
    await apiFetch('/api/alerts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker, condition, targetPrice: price }),
    });
    alertForm.classList.remove('open');
    await loadAlerts();
  } catch (err) {
    alert('Failed to create alert. Please try again.');
  } finally {
    alertSave.textContent = 'Save';
    alertSave.disabled = false;
  }
});

function renderAlerts(data) {
  const el = document.getElementById('alerts-content');
  const alerts = data.alerts || data || [];

  if (!alerts.length) {
    el.innerHTML = renderEmpty('⚡', 'No alerts set. Tap + Add Alert to create one.');
    return;
  }

  el.innerHTML = alerts.map(a => {
    const statusClass = a.status === 'triggered' ? 'triggered-status' : 'active-status';
    const statusLabel = a.status === 'triggered' ? 'Triggered' : 'Active';
    const condLabel = a.condition === 'above' ? 'Above' : 'Below';
    return `
      <div class="alert-item" data-id="${a.id || a._id || ''}">
        <div class="alert-info">
          <div class="alert-ticker">${(a.ticker || '').toUpperCase()}</div>
          <div class="alert-condition">${condLabel} $${fmt(a.targetPrice, 2)}</div>
        </div>
        <span class="alert-status ${statusClass}">${statusLabel}</span>
        <button class="alert-delete" data-id="${a.id || a._id || ''}" title="Delete">&times;</button>
      </div>`;
  }).join('');

  // Wire up delete buttons
  el.querySelectorAll('.alert-delete').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const alertId = btn.dataset.id;
      if (!alertId) return;

      btn.textContent = '...';
      try {
        await apiFetch(`/api/alerts/${alertId}`, { method: 'DELETE' });
        await loadAlerts();
      } catch (err) {
        btn.textContent = '\u00d7';
        alert('Failed to delete alert.');
      }
    });
  });
}

async function loadAlerts() {
  const el = document.getElementById('alerts-content');
  el.innerHTML = renderLoading('Loading alerts...');
  state.alertsLoaded = true;

  try {
    const data = await apiFetch('/api/alerts');
    state.alertsData = data;
    renderAlerts(data);
  } catch (err) {
    state.alertsLoaded = false;
    el.innerHTML = renderError('Could not load alerts.', loadAlerts);
  }
}

/* ============================================================
   App Init
   ============================================================ */
loadPortfolio();
</script>
</body>
